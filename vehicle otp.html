<html>
    <head>
        <title>Registration - OTP</title>
    </head>
    <body>
        <h3>Registration Page</h3>
        <form action="/reg">
            <div>
                <label >Mobile No::::::::</label>
                <input type="text" required pattern="[6-9][0-9]{9}"/>
            </div>
            <br>
            <div>
                <label >Vehicle Number:</label>
                <input type="text" required pattern="^KA[0-9]{2}[a-zA-Z]{2}[0-9]{4}" />
            </div>

            <input type="submit" value="Get Details">
        </form>
    </body>
</html>
